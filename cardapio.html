<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio | Food</title>

    <meta name="description"
        content="Confira o cardápio completo: burgers artesanais, porções e bebidas. Peça pelo WhatsApp ou telefone.">

    <meta name="theme-color" content="#ffcb45">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://unpkg.com/scrollreveal"></script>
</head>

<body>

<header>
    <nav id="navbar">

        <a href="index.html" id="nav_logo">
            <i class="fa-solid fa-burger"></i> food
        </a>

        <ul id="nav_list">
            <li><a href="index.html#home">Início</a></li>
            <li><a href="cardapio.html" class="active">Cardápio</a></li>
        </ul>

        <button id="mobile_btn">
            <i class="fa-solid fa-bars"></i>
        </button>

    </nav>

    <div id="mobile_menu">
        <ul>
            <li><a href="index.html#home">Início</a></li>
            <li><a href="cardapio.html">Cardápio</a></li>
        </ul>
    </div>
</header>

<main>

<section id="menu-page">

    <h2>Nosso Cardápio</h2>

    <div class="menu-tabs">
        <button class="menu-tab active" data-category="all">Todos</button>
        <button class="menu-tab" data-category="salgados">Salgados</button>
        <button class="menu-tab" data-category="doces">Doces</button>
        <button class="menu-tab" data-category="bebidas">Bebidas</button>
    </div>

    <div class="menu-items">

        <!-- SALGADOS -->
        <div class="dish" data-category="salgados">
            <div class="img-box">
                <img src="src/img/macarrao.jpg">
            </div>
            <h3>Macarrão ao Molho Branco</h3>
        </div>

        <div class="dish" data-category="salgados">
            <div class="img-box">
                <img src="src/img/frango.avif">
            </div>
            <h3>Frango Grelhado</h3>
        </div>

        <div class="dish" data-category="salgados">
            <div class="img-box">
                <img src="src/img/lasanha.jpg">
            </div>
            <h3>Lasanha</h3>
        </div>

        <div class="dish" data-category="salgados">
            <div class="img-box">
                <img src="src/img/pizza.jpg">
            </div>
            <h3>Pizza Artesanal</h3>
        </div>

        <!-- DOCES -->
        <div class="dish" data-category="doces">
            <div class="img-box">
                <img src="src/img/bolo.jpg">
            </div>
            <h3>Bolo Caseiro</h3>
        </div>

        <div class="dish" data-category="doces">
            <div class="img-box">
                <img src="src/img/torta.jpg">
            </div>
            <h3>Torta Especial</h3>
        </div>

        <!-- BEBIDAS -->
        <div class="dish" data-category="bebidas">
            <div class="img-box">
                <img src="src/img/refrigerante.png">
            </div>
            <h3>Refrigerante</h3>
        </div>

        <div class="dish" data-category="bebidas">
            <div class="img-box">
                <img src="src/img/drink.jpg">
            </div>
            <h3>Suco Natural</h3>
        </div>

    </div>

</section>

</main>

<script>
$(document).ready(function () {

    $('#mobile_btn').click(function () {
        $('#mobile_menu').toggleClass('active');
        $('#mobile_btn i').toggleClass('fa-bars fa-x');
    });

    const tabs = document.querySelectorAll('.menu-tab');
    const dishes = document.querySelectorAll('.dish');

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {

            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            const category = tab.getAttribute('data-category');

            dishes.forEach(dish => {
                const itemCategory = dish.getAttribute('data-category');

                dish.style.display =
                    (category === 'all' || category === itemCategory)
                        ? 'block'
                        : 'none';
            });

        });
    });

});
</script>

</body>
</html>
